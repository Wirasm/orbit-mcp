description_long: |
  This demonstration pack showcases OAuth capabilities with Docker MCP.
  It includes:
  - GitHub: Full repository management, issues, PRs with OAuth authentication
  - Google Drive: File management and sharing with OAuth authentication  
  - Time: Basic time utilities (no authentication required)
  
  This pack demonstrates the complete OAuth workflow from authorization
  to tool execution with authenticated services.